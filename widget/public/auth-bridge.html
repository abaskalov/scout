<!DOCTYPE html>
<html>
<head><title>Scout Auth Bridge</title></head>
<body>
<script>
// Scout Auth Bridge — stores JWT token in localStorage on Scout domain.
// Embedded as hidden iframe by the widget on any host site.
// Communication via postMessage.

const TOKEN_KEY = '__scout_bridge_token__';
const USER_KEY = '__scout_bridge_user__';

window.addEventListener('message', (e) => {
  // Only accept messages with scout-auth-bridge type
  if (!e.data || e.data.type !== 'scout-auth-bridge') return;

  const { action, token, user } = e.data;

  if (action === 'set') {
    // Store token after login
    if (token) localStorage.setItem(TOKEN_KEY, token);
    if (user) localStorage.setItem(USER_KEY, JSON.stringify(user));
    e.source.postMessage({ type: 'scout-auth-bridge', action: 'set-ok' }, '*');
  }

  if (action === 'get') {
    // Return stored token
    const storedToken = localStorage.getItem(TOKEN_KEY);
    const storedUser = localStorage.getItem(USER_KEY);
    e.source.postMessage({
      type: 'scout-auth-bridge',
      action: 'get-ok',
      token: storedToken,
      user: storedUser ? JSON.parse(storedUser) : null,
    }, '*');
  }

  if (action === 'clear') {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(USER_KEY);
    e.source.postMessage({ type: 'scout-auth-bridge', action: 'clear-ok' }, '*');
  }
});
</script>
</body>
</html>
